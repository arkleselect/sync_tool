<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Action | 跨设备同步</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: grid;
            gap: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #555;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            display: inline-block;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            transition: border 0.3s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .upload-area {
            border: 2px dashed #cfcfcf;
            padding: 50px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .upload-area:hover {
            background-color: #f9f9f9;
            border-color: var(--primary-color);
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-label {
            pointer-events: none;
            color: #555;
            font-weight: 500;
        }

        .hint-text {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }

        #progressContainer {
            margin-top: 15px;
        }

        .progress-item {
            margin-bottom: 10px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            height: 24px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.2s;
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 10px;
            line-height: 24px;
            font-size: 12px;
            color: #333;
            font-weight: bold;
            z-index: 2;
        }

        #fileList {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        #fileList li {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        #fileList li:last-child {
            border-bottom: none;
        }

        #fileList a {
            text-decoration: none;
            color: #333;
            flex-grow: 1;
            display: block;
        }

        #fileList a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .button-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #555;
        }

        .btn:hover {
            background: #f0f7ff;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-danger:hover {
            background: #fff5f5;
            border-color: #ff4d4f;
            color: #ff4d4f;
        }

        .delete-btn {
            color: #ff4d4f;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 4px;
            transition: background 0.2s;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background-color: #fff1f0;
        }

        /* 拖拽效果 */
        .upload-area.drag-over {
            background-color: #f0f7ff;
            border-color: var(--primary-color);
            border-style: solid;
        }

        /* 自定义弹窗样式 */
        #customModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .modal-message {
            margin-bottom: 25px;
            font-size: 16px;
            color: #444;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .modal-btn-confirm {
            background: #ff4d4f;
            color: #fff;
            border-color: #ff4d4f;
        }

        .modal-btn-confirm:hover {
            background: #ff7875;
            border-color: #ff7875;
        }

        .modal-btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .modal-btn-cancel:hover {
            background: #e8e8e8;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h3>文本同步</h3>
            <textarea id="textInput" placeholder="在此输入文本，将自动同步到所有设备...">{{ initial_text }}</textarea>
            <div class="button-group">
                <button id="clearBtn" class="btn btn-danger">
                    清空
                </button>
            </div>
        </div>

        <div class="card">
            <h3>文件传输</h3>

            <div class="upload-area">
                <input type="file" id="fileInput" multiple />
                <div class="upload-label">
                    点击或拖拽文件至此 (支持批量上传)
                </div>
            </div>
            <div class="hint-text">单个文件最大支持 5GB</div>

            <div id="progressContainer"></div>

            <h3>当前文件列表:</h3>
            <ul id="fileList">
                {% for filename in initial_files %}
                <li data-filename="{{ filename }}">
                    <a href="/uploads/{{ filename }}" target="_blank">{{ filename }}</a>
                    <span class="delete-btn" onclick="deleteFile('{{ filename }}')" title="删除">删除</span>
                </li>
                {% endfor %}
            </ul>
        </div>
    <div id="customModal">
        <div class="modal-content">
            <div class="modal-message" id="modalMessage">确定要执行此操作吗？</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const textarea = document.getElementById("textInput");
        const clearBtn = document.getElementById("clearBtn");
        const fileInput = document.getElementById("fileInput");
        const uploadArea = document.querySelector(".upload-area");
        const fileList = document.getElementById("fileList");
        const progressContainer = document.getElementById("progressContainer");

        // --- 文本同步 ---
        function sendText(text) {
            socket.emit("send_text", { text: text });
        }

        textarea.addEventListener("input", () => {
            sendText(textarea.value);
        });

        // 清空功能
        clearBtn.addEventListener("click", () => {
            textarea.value = "";
            sendText("");
        });

        socket.on("update_text", (data) => {
            if (textarea.value !== data.text) {
                textarea.value = data.text;
            }
        });

        // --- 文件上传 ---
        fileInput.addEventListener("change", () => {
            const files = fileInput.files;
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                uploadSingleFile(file);
            });

            fileInput.value = '';
        });

        function uploadSingleFile(file) {
            const progressItem = document.createElement("div");
            progressItem.className = "progress-item";

            const progressBar = document.createElement("div");
            progressBar.className = "progress-bar";

            const progressText = document.createElement("div");
            progressText.className = "progress-text";
            progressText.textContent = `准备上传: ${file.name}`;

            progressItem.appendChild(progressBar);
            progressItem.appendChild(progressText);
            progressContainer.prepend(progressItem);

            const formData = new FormData();
            formData.append("files", file);

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/upload", true);

            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = (event.loaded / event.total) * 100;
                    progressBar.style.width = percent + "%";
                    progressText.textContent = `上传中 ${file.name}: ${Math.round(percent)}%`;
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            progressBar.style.backgroundColor = "#4caf50";
                            progressText.textContent = `上传完成: ${file.name}`;
                            setTimeout(() => progressItem.remove(), 2000);
                        } else {
                            progressText.textContent = `失败: ${data.message}`;
                            progressBar.style.backgroundColor = "#f44336";
                        }
                    } catch (e) {
                        progressText.textContent = `解析错误`;
                        progressBar.style.backgroundColor = "#f44336";
                    }
                } else if (xhr.status === 413) {
                    progressText.textContent = `文件过大 (超过50GB)`;
                    progressBar.style.backgroundColor = "#f44336";
                } else {
                    progressText.textContent = `服务器错误: ${xhr.status}`;
                    progressBar.style.backgroundColor = "#f44336";
                }
            };

            xhr.onerror = () => {
                progressText.textContent = `网络错误`;
                progressBar.style.backgroundColor = "#f44336";
            };

            xhr.send(formData);
        }

        // --- 拖拽效果 ---
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadArea.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadArea.classList.remove('drag-over');
            }, false);
        });

        uploadArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                Array.from(files).forEach(file => uploadSingleFile(file));
            }
        }, false);

        // 自定义确认弹窗逻辑
        function showConfirm(message, onConfirm) {
            const modal = document.getElementById("customModal");
            const msgEl = document.getElementById("modalMessage");
            const confirmBtn = document.getElementById("modalConfirm");
            const cancelBtn = document.getElementById("modalCancel");

            msgEl.textContent = message;
            modal.style.display = "flex";

            const cleanup = () => {
                modal.style.display = "none";
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                cleanup();
                onConfirm();
            };
            cancelBtn.onclick = cleanup;
        }

        async function deleteFile(filename) {
            showConfirm(`确定要永久删除文件 "${filename}" 吗？`, async () => {
                try {
                    const response = await fetch(`/delete/${filename}`, { method: "DELETE" });
                    const data = await response.json();
                    if (!data.success) alert(data.message);
                } catch (err) {
                    alert("删除失败，请稍后重试。");
                }
            });
        }

        // --- 新文件及删除通知 ---
        socket.on("new_file", (data) => {
            addFileToList(data.filename);
        });

        socket.on("file_deleted", (data) => {
            removeFileFromList(data.filename);
        });

        function addFileToList(filename) {
            const existingItem = fileList.querySelector(`li[data-filename="${filename}"]`);
            if (existingItem) return;

            const li = document.createElement("li");
            li.setAttribute("data-filename", filename);

            const aView = document.createElement("a");
            aView.href = `/uploads/${filename}`;
            aView.textContent = filename;
            aView.target = "_blank";

            const delSpan = document.createElement("span");
            delSpan.className = "delete-btn";
            delSpan.innerHTML = "删除";
            delSpan.title = "删除";
            delSpan.onclick = () => deleteFile(filename);

            li.appendChild(aView);
            li.appendChild(delSpan);
            fileList.insertBefore(li, fileList.firstChild);
        }

        function removeFileFromList(filename) {
            const item = fileList.querySelector(`li[data-filename="${filename}"]`);
            if (item) item.remove();
        }
    </script>
</body>

</html>
